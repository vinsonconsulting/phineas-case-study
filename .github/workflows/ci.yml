name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  reference-impl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference-impl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npm test
